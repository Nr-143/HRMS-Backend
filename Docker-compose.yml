services:
  backend:
    build:
      context: .
    container_name: backend
    ports:
      - "3000:3000"
      - "5555:5555"

    env_file:
      - .env.docker
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - BE-NETWORK

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - BE-NETWORK

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: "nirmal"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "hrms"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - BE-NETWORK

networks:
  BE-NETWORK:
    driver: bridge

volumes:
  pgdata: